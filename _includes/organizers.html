<!-- Organizers section -->
<div class="section scrollspy section-gray-section" id="organizers">
  <div class="container">
    <h4 class="center-align section-gray-header">Workshop Organizers</h4>

    <div class="row">
      <div class="col s12 m12 l12 section-gray-body">
        <p class="center">For any question about the workshop organization, please contact 
          <a href="mailto:{{site.organizer-email}}">{{site.organizer-email}}</a>.
        </p>
      </div>
    </div>

    <div class="row center-align">
      {% for organizers in site.data.organizers %}
      <a href="{{organizers.website}}">
        <div class="col s12 m4 l4" style="
          max-width: 220px;
          margin: 0 auto;
          float: none;
          display: inline-block;
      ">
          <div class="card hoverable">
            <div class="card-image" style="
              width: 100%;
              aspect-ratio: 1 / 1;
              overflow: hidden;
              display: flex;
              align-items: center;
              justify-content: center;
            ">
              <img class="activator portrait-img" src="{{organizers.image}}"
                style="
                  width: 100%;
                  height: 100%;
                  object-fit: cover;
                  object-position: center top;
                ">
            </div>
            <div class="card-content" id="secondary-title">
              <div style="width: 100%; float: left;">
                <span class="card-title activator" id="main-title-text">
                  {{organizers.name}}</span>
                <span class="card-title activator" id="secondary-title-text">
                  {{organizers.affiliation}}</span>
              </div>
            </div>
          </div>
        </div>
      </a>
      {% endfor %}
    </div>

  </div>
</div>
